---
- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    lock_timeout: 180  # 3m
    state: present

- name: Allow Kubernetes API server (6443)
  community.general.ufw:
    rule: allow
    port: 6443
    proto: any
    comment: "Kubernetes API server"
  notify: Restart UFW

- name: Allow etcd server client API (2379-2380)
  community.general.ufw:
    rule: allow
    port: "2379:2380"
    proto: tcp
    comment: "etcd server client API"
  notify: Restart UFW

- name: Allow Kubelet API (10250)
  community.general.ufw:
    rule: allow
    port: 10250
    proto: any
    comment: "Kubelet API"
  notify: Restart UFW

- name: Allow kube-scheduler (10259)
  community.general.ufw:
    rule: allow
    port: 10259
    proto: any
    comment: "kube-scheduler"
  notify: Restart UFW

- name: Allow kube-controller-manager (10257)
  community.general.ufw:
    rule: allow
    port: 10257
    proto: any
    comment: "kube-controller-manager"
  notify: Restart UFW

- name: Allow kube-proxy (10256)
  community.general.ufw:
    rule: allow
    port: 10256
    proto: any
    comment: "kube-proxy"
  notify: Restart UFW

- name: Allow NodePort services (30000-32767)
  community.general.ufw:
    rule: allow
    port: "30000:32767"
    proto: tcp
    comment: "NodePort services"
  notify: Restart UFW

- name: Allow from 10.42.0.0/16 to any
  community.general.ufw:
    rule: allow
    from_ip: 10.42.0.0/16
    to_ip: any
    proto: any
    comment: "pods"
  notify: Restart UFW

- name: Allow from 10.43.0.0/16 to any
  community.general.ufw:
    rule: allow
    from_ip: 10.43.0.0/16
    to_ip: any
    proto: any
    comment: "services"
  notify: Restart UFW

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Ensure UFW is enabled on boot
  ansible.builtin.systemd:
    name: ufw
    enabled: true
...
